name: Security

on:
  pull_request:
    paths:
      - ".github/workflows/security.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "src-tauri/**"
      - "ui/package-lock.json"
      - "ui/package.json"
      - "ui/src/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/security.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**"
      - "src-tauri/**"
      - "ui/package-lock.json"
      - "ui/package.json"
      - "ui/src/**"
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: dependency-review
        uses: actions/dependency-review-action@v5.0.0
        continue-on-error: true
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

      - name: Summarize unavailable dependency review
        if: steps.dependency-review.outcome == 'failure'
        run: |
          echo "::warning title=Dependency Review unavailable::GitHub dependency graph is disabled or unavailable for this repository; enable it in repository security settings to make this gate blocking."
          {
            echo "## Dependency Review"
            echo
            echo "Dependency Review could not run. GitHub reported that dependency graph is disabled or unavailable for this repository."
            echo
            echo "Enable dependency graph in repository security settings to turn this into a blocking dependency gate."
          } >> "$GITHUB_STEP_SUMMARY"

  codeql:
    name: CodeQL JavaScript/TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
