type: automation
spec_version: "1"
name: Douyin Live Moderator
version: 0.1.0
author: uClaw Team
description: Room-scoped Douyin live moderator powered by uClaw AI Browser automation and gbrain.
icon: social
permissions:
  - ai_browser
  - notification
requires:
  mcps:
    - id: ai-browser
      reason: Open the configured Douyin live room and execute bundled browser_run scripts in the logged-in browser session.
    - id: gbrain
      reason: Recall and update the room-scoped knowledge base without exposing unrelated global knowledge.
  skills:
    - id: douyin-enter-room
      reason: Confirm the logged-in browser session is inside the configured Douyin live room.
      bundled: true
      files:
        - index.js
    - id: douyin-scan-comments
      reason: Extract structured live-room comments from the current Douyin page.
      bundled: true
      files:
        - index.js
    - id: douyin-check-room-status
      reason: Detect whether the live room is still live or has ended.
      bundled: true
      files:
        - index.js
    - id: douyin-send-reply
      reason: Send selective moderator replies through the logged-in live room session.
      bundled: true
      files:
        - index.js
    - id: douyin-warn-user
      reason: Warn users who are spamming, sending sensitive comments, or creating negative disruption.
      bundled: true
      files:
        - index.js
    - id: douyin-mute-user
      reason: Mute a verified user after repeated warnings when action_mode is real.
      bundled: true
      files:
        - index.js
    - id: douyin-remove-user
      reason: Remove a verified user from the room for severe or repeated violations when action_mode is real.
      bundled: true
      files:
        - index.js
browser_login:
  - url: https://www.douyin.com/
    label: Douyin
subscriptions:
  - id: live-room-monitor
    source:
      type: manual
      config: {}
    frequency:
      default: continuous
      min: 30s
      max: continuous
config:
  platform: douyin
  room_id: ""
  live_url: ""
  knowledge_scope: room_only
  action_mode: real
  poll_interval_seconds: 30
config_schema:
  - key: platform
    label: Live Platform
    type: select
    required: true
    default: douyin
    description: Live platform adapter to use for this moderator run.
    options:
      - label: Douyin
        value: douyin
  - key: room_id
    label: Room ID
    type: string
    required: true
    default: ""
    placeholder: "895588557184"
    description: Douyin live room identifier used for room-scoped state and fallback URL construction.
  - key: live_url
    label: Live URL
    type: string
    required: false
    default: ""
    placeholder: https://live.douyin.com/895588557184
    description: Exact live-room URL. When set, this URL is used before room_id fallback construction.
  - key: moderator_persona
    label: Moderator Persona
    type: text
    required: false
    default: ""
    placeholder: I am the room moderator. I answer product questions, maintain atmosphere, and enforce room rules.
    description: Optional persona and tone guidance for replies.
  - key: reply_policy
    label: Reply Policy
    type: text
    required: false
    default: ""
    placeholder: Prioritize real questions. Reply briefly. Do not answer every comment.
    description: Optional extra policy for selecting and composing replies.
  - key: knowledge_scope
    label: Knowledge Scope
    type: select
    required: true
    default: room_only
    description: Use room_only for production isolation. global is available for testing only.
    options:
      - label: Room only
        value: room_only
      - label: Global testing
        value: global
  - key: action_mode
    label: Action Mode
    type: select
    required: true
    default: real
    description: real executes moderator actions; dry_run records intended actions without clicking moderation controls.
    options:
      - label: Real
        value: real
      - label: Dry run
        value: dry_run
  - key: poll_interval_seconds
    label: Poll Interval Seconds
    type: number
    required: true
    default: 30
    description: Comment scan interval. The first version defaults to 30 seconds.
system_prompt: |
  You are the logged-in Douyin live-room moderator assistant. Operate only in the configured platform and room.
  Follow this Halo/DHP-style browser automation flow strictly.

  ## Browser and login
  - Use the configured browser_login profile for Douyin. Do not ask for or store passwords.
  - Enter the room using live_url when provided; otherwise construct https://live.douyin.com/<room_id>.
  - Use only the bundled browser_run-compatible Douyin scripts for room actions:
    - .claude/skills/douyin-enter-room/index.js
    - .claude/skills/douyin-scan-comments/index.js
    - .claude/skills/douyin-check-room-status/index.js
    - .claude/skills/douyin-send-reply/index.js
    - .claude/skills/douyin-warn-user/index.js
    - .claude/skills/douyin-mute-user/index.js
    - .claude/skills/douyin-remove-user/index.js

  ## Comment loop
  - Scan new comments every poll_interval_seconds.
  - Reply selectively. Prioritize real questions, product/knowledge questions, and comments where room-scoped gbrain knowledge helps.
  - Do not reply to every comment. For routine atmosphere comments, reply only when it improves the room.
  - Extract durable, useful knowledge from comments and write it back only to the room/platform-scoped gbrain namespace.
  - knowledge_scope=room_only must never expose unrelated global gbrain knowledge. knowledge_scope=global is only for testing.

  ## Moderation policy
  - Treat yourself as the room moderator.
  - For spam, sensitive, abusive, or strongly negative disruptive comments, warn first.
  - If the same verified user ignores two warnings, use action_mode:
    - real: execute mute_user or remove_user through the bundled script.
    - dry_run: record the intended action only.
  - Verify target identity before muting or removing. If verification fails, record the failure and do not guess.

  ## Stop and report
  - Stop automatically when the room status script detects that the live room ended.
  - Stop when the app user cancels the run.
  - Final report must include stop reason, live_url, comments scanned, replies sent, warnings, mutes, removals, gbrain recalls/writes, and any adapter errors.
x_uclaw_runtime:
  kind: live_room_moderator
  poll_interval_seconds: 30
  action_mode_default: real
memory_schema:
  seen_comment_ids:
    type: array
    description: Recently processed live comment IDs for duplicate suppression.
  warned_users:
    type: object
    description: Per-room warning counts keyed by verified user ID.
  last_run_at:
    type: date
    description: Last live-room moderator run timestamp.
output:
  notify:
    system: true
  format: markdown
