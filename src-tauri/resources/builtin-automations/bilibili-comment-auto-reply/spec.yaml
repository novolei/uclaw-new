type: automation
spec_version: "1"
name: B站评论自动回复
version: 2.0.0
author: openkursar
description: 监控 B 站消息中心的评论通知，以 UP 主身份对新评论发送有针对性的回复，避免重复。Zero-hardcoded 动态运行。
icon: social
permissions:
  - ai_browser
requires:
  mcps:
    - id: ai-browser
      reason: Open Bilibili message center pages and evaluate custom browser interactions.
browser_login:
  - url: https://www.bilibili.com
    label: Bilibili
subscriptions:
  - type: schedule
    every: 2h
config_schema:
  - key: creator_persona
    label: Creator Persona
    type: text
    description: Describe the creator's content focus and expertise to guide reply tone.
    required: false
    default: ""
    placeholder: I am an indie developer focused on AI Agent desktop tools and Halo open-source project tutorials.
  - key: reply_signature
    label: Reply Signature
    type: string
    description: Optional text appended to each reply; leave blank to omit.
    required: false
    default: "-- uClaw Bilibili digital human"
    placeholder: "-- AI assistant reply"
  - key: max_replies_per_run
    label: Max Replies per Run
    type: number
    description: Maximum number of comments to reply to in a single run.
    required: true
    default: 5
  - key: output_language
    label: Output Language
    type: select
    required: true
    default: zh-CN
    options:
      - label: 中文
        value: zh-CN
      - label: English
        value: en-US
store:
  slug: bilibili-comment-replier
  category: social
  tags:
    - bilibili
    - comments
    - auto-reply
    - creator
    - social
    - B站
    - 评论
  locale: zh-CN
  min_app_version: 0.5.0
  license: MIT
  registry_id: official
system_prompt: |
  You are a Bilibili creator reply assistant. Reply as the creator to the "reply to me" notifications in Bilibili's message center.
  Instead of static files, you will evaluate dynamic web request scripts directly in the browser's context.

  ## API Interaction Manual
  - **Login Validation**:
    - Open `https://message.bilibili.com/#/reply` first.
    - Evaluate a fetch call inside `browser_evaluate` pointing to `https://api.bilibili.com/x/web-interface/nav` with `{ credentials: 'include' }`.
    - If `isLogin` is false, report that login is required and stop.
  - **Message Center Fetching**:
    - Fetch reply notifications by evaluating:
      `fetch('https://api.bilibili.com/x/msgfeed/reply?platform=web&build=0&mobi_app=web', { credentials: 'include' }).then(r => r.json())`
    - Extract relevant list items: `id`, `user.nickname`, `item.source_content` (comment text), video metadata, and API reply keys: `oid` (subject id), `reply_type` (business_id), `root`, and `parent`.
  - **Generating & Sending Replies**:
    - Filter out notifications in `memory.replied_ids`.
    - For each remaining comment, extract the `bili_jct` CSRF token from the browser cookie:
      `const csrf = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('bili_jct='))?.split('=')[1]`
    - Send a POST reply using `fetch`:
      ```javascript
      const formData = new URLSearchParams();
      formData.append('oid', String(oid));
      formData.append('type', String(reply_type));
      formData.append('message', replyText);
      formData.append('scene', 'msg');
      formData.append('plat', '1');
      formData.append('from', 'im-reply');
      formData.append('build', '0');
      formData.append('mobi_app', 'web');
      formData.append('root', String(root));
      formData.append('parent', String(parent));
      formData.append('csrf', csrf);

      fetch('https://api.bilibili.com/x/v2/reply/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        credentials: 'include',
        body: formData.toString()
      }).then(r => r.json())
      ```
    - Check the response code: code `0` is success. Append successful IDs to `replied_ids`.

  ## Polling Loop and Report
  - Loop through up to `max_replies_per_run`.
  - Save session state and compile a detailed markdown report of processed/successful/skipped comment replies.
x_uclaw_runtime:
  kind: agentic_loop
memory_schema:
  replied_ids:
    type: array
    description: Replied notification IDs, keeping the latest 5000.
  last_run_at:
    type: date
    description: Last successful run timestamp.
output:
  notify:
    system: true
  format: markdown
escalation:
  enabled: true
  timeout_hours: 24
