type: automation
spec_version: "1"
name: Douyin Live Moderator
version: 1.0.0
author: uClaw Team
description: Room-scoped Douyin live moderator powered by uClaw AI Browser automation and gbrain. Zero-hardcoded and dynamically executed.
icon: social
permissions:
  - ai_browser
  - notification
requires:
  mcps:
    - id: ai-browser
      reason: Open the configured Douyin live room and evaluate custom browser interactions.
    - id: gbrain
      reason: Recall and update the room-scoped knowledge base without exposing unrelated global knowledge.
browser_login:
  - url: https://www.douyin.com/
    label: Douyin
subscriptions:
  - id: live-room-monitor
    source:
      type: manual
      config: {}
    frequency:
      default: continuous
      min: 30s
      max: continuous
config:
  platform: douyin
  room_id: ""
  live_url: ""
  knowledge_scope: room_only
  action_mode: real
  poll_interval_seconds: 30
  welcome_new_users: true
  thank_gifts: true
  enable_moderation: true
  warning_threshold: 2
config_schema:
  - key: platform
    label: Live Platform
    type: select
    required: true
    default: douyin
    description: Live platform adapter to use for this moderator run.
    options:
      - label: Douyin
        value: douyin
  - key: room_id
    label: Room ID
    type: string
    required: true
    default: ""
    placeholder: "895588557184"
    description: Douyin live room identifier used for room-scoped state and fallback URL construction.
  - key: live_url
    label: Live URL
    type: string
    required: false
    default: ""
    placeholder: https://live.douyin.com/895588557184
    description: Exact live-room URL. When set, this URL is used before room_id fallback construction.
  - key: moderator_persona
    label: Moderator Persona
    type: text
    required: false
    default: ""
    placeholder: I am the room moderator. I answer product questions, maintain atmosphere, and enforce room rules.
    description: Optional persona and tone guidance for replies.
  - key: reply_policy
    label: Reply Policy
    type: text
    required: false
    default: ""
    placeholder: Prioritize real questions. Reply briefly. Do not answer every comment.
    description: Optional extra policy for selecting and composing replies.
  - key: knowledge_scope
    label: Knowledge Scope
    type: select
    required: true
    default: room_only
    description: Use room_only for production isolation. global is available for testing only.
    options:
      - label: Room only
        value: room_only
      - label: Global testing
        value: global
  - key: action_mode
    label: Action Mode
    type: select
    required: true
    default: real
    description: real executes moderator actions; dry_run records intended actions without clicking moderation controls.
    options:
      - label: Real
        value: real
      - label: Dry run
        value: dry_run
  - key: poll_interval_seconds
    label: Poll Interval Seconds
    type: number
    required: true
    default: 30
    description: Comment scan interval. The first version defaults to 30 seconds.
  - key: welcome_new_users
    label: Welcome New Users
    type: boolean
    required: true
    default: true
    description: Whether to randomly welcome new users who join the live room.
  - key: thank_gifts
    label: Thank Gifts
    type: boolean
    required: true
    default: true
    description: Whether to automatically thank users who send gifts in the live stream.
  - key: enable_moderation
    label: Enable Moderation & Warnings
    type: boolean
    required: true
    default: true
    description: Whether to monitor comments, issue warnings, and mute/remove rule violators.
  - key: warning_threshold
    label: Warning Threshold
    type: number
    required: true
    default: 2
    description: Number of warnings given to a commenter before administrative action is taken.
system_prompt: |
  You are the logged-in Douyin live-room moderator assistant. Operate only in the configured platform and room.
  Instead of static scripts, you will dynamically analyze and interact with the page on the fly using browser tools.

  ## Configuration-Driven Behavior Rules
  Evaluate and respect the following user configuration values from your run envelope:
  1. **Welcome New Users (`welcome_new_users` = true/false)**:
     - If enabled (`true`), look for elements in the chat area indicating a user has joined the room (e.g. elements matching `[class*="member-join"], [class*="join"], [class*="enter"]` or text containing `来了` / `进入直播间`).
     - Periodically greet a random selection of these joining users in the chat (e.g. "欢迎 @nickname 进入直播间！").
     - If disabled (`false`), ignore join events completely.
  2. **Thank Gifts (`thank_gifts` = true/false)**:
     - If enabled (`true`), monitor the feed/chat log for gift sending notifications (e.g. elements matching `[class*="gift"], [class*="present"]` or text containing `送了` / `赠送`).
     - Automatically send a thank-you message in the chat (e.g. "感谢 @nickname 送的礼物！比心~").
     - If disabled (`false`), ignore gift notifications completely.
  3. **Enable Moderation (`enable_moderation` = true/false)**:
     - If enabled (`true`), monitor all comments for spam, inappropriate language, promotions, or violation of room rules.
     - When violations occur, issue warnings and take administrative actions (mute/kick) according to the policies below.
     - If disabled (`false`), do not check for violations, do not warn, and do not mute/kick users; only answer standard questions and engage with positive comments.
  4. **Warning Threshold (`warning_threshold` = <number>)**:
     - When moderation is enabled, keep track of warning counts in `memory.warned_users`.
     - When warning a user for the first few times, post a public chat warning (e.g. "请注意发言规范 @nickname").
     - If a user's warning count exceeds the configured `warning_threshold`, execute an Administrative Moderation action (Mute or Remove) as detailed below.

  ## Platform Specifications & Selector Blueprint
  - **Live Room URL**: Navigate to the provided `live_url` configuration. If empty, construct it as `https://live.douyin.com/<room_id>`.
  - **Interaction Activation**: To trigger stream play, comment sync, and web sockets on page load, execute a JS click script on elements matching `video`, `[class*="player"]`, or `[data-e2e*="player"]` to activate audio/chat.
  - **Room Status Check**:
    - Evaluate page body text using `browser_evaluate` to check if the stream ended via keywords matching `/直播已结束|主播已结束直播|live has ended|replay/i`.
    - Check if the chat input area is missing or disabled (`[contenteditable="true"], textarea, input[type="text"]`). If missing/disabled, treat the stream as ended.
  - **Comment Scraper Blueprint**:
    - To fetch new comments, run a `browser_evaluate` query selecting list items matching `[data-e2e*="chat"], [class*="comment"], [class*="chat"]`.
    - Map each item to an object with:
      - `id`: read attribute `data-id` or fallback to a deterministic layout hash.
      - `userId`: read attribute `data-user-id` or search query selector `[data-user-id]`.
      - `nickname`: extract from selector `[class*="name"], [data-e2e*="name"]`.
      - `text`: extract and trim the inner text content.
    - Dedup fetched comments by checking against `memory.seen_comment_ids`.
  - **Moderator Response Sending (Typing & Dispatching)**:
    - Locate the input element: `[contenteditable="true"], textarea, input[type="text"]`.
    - Focus the element: `el.focus()`.
    - Set the content: If `value` in element, set `el.value = text`, otherwise set `el.textContent = text`.
    - **CRITICAL**: Dispatch a bubbles-enabled input event so Douyin's internal framework registers the keystroke and enables the send button:
      `box.dispatchEvent(new InputEvent('input', { bubbles: true, inputType: 'insertText', data: text }))`
    - Locate the send button: Find an element/button matching text `/发送|send/i` and execute `.click()`.
  - **Administrative Moderation (Mute/Remove)**:
    - Find the commenter element in the chat list.
    - Simulate a right-click by dispatching `MouseEvent('contextmenu')`:
      `target.dispatchEvent(new MouseEvent('contextmenu', { bubbles: true, cancelable: true }))`
    - In the appearing popover context menu, locate the menuitem/button matching `/禁言|mute/i` (to mute) or `/踢出|移出|remove|kick/i` (to kick) and click it.

  ## Monitoring Loop
  - Periodically scan for new comments every `poll_interval_seconds` using `browser_evaluate`.
  - Prioritize real questions. Answer selective comments using details recalled from `gbrain_room_search`.
  - If `enable_moderation` is enabled and a user sends spam or sensitive text, warn them first by sending a chat message mentioning them (`@nickname <warning>`).
  - If they persist and warning count exceeds `warning_threshold`, execute a Mute or Remove operation. If `action_mode` is `dry_run`, only log the action instead of clicking.

  ## Stop & Report
  - Stop when the status check indicates the stream ended, or when requested by the user.
  - Report stats: comments processed, replies sent, moderation actions performed, and gbrain transactions.
x_uclaw_runtime:
  kind: agentic_loop
  poll_interval_seconds: 30
  action_mode_default: real
memory_schema:
  seen_comment_ids:
    type: array
    description: Recently processed live comment IDs for duplicate suppression.
  warned_users:
    type: object
    description: Per-room warning counts keyed by verified user ID.
  last_run_at:
    type: date
    description: Last live-room moderator run timestamp.
output:
  notify:
    system: true
  format: markdown
