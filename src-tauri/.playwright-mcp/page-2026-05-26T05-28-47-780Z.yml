          - listitem [ref=e458]: 与上一代 iPhone 相比。
          - listitem [ref=e459]: iPhone 17e、iPhone 17、iPhone Air 和 iPhone 17 Pro 系列机型可防溅、抗水、防尘，在受控实验室条件下经测试，其效果在 IEC 60529 标准下达到 IP68 级别 (在最深 6 米的水下停留时间最长可达 30 分钟)。防溅、抗水、防尘功能并非永久有效，防护性能可能会因日常磨损而下降。请勿为潮湿状态下的 iPhone 充电；请参阅使用手册了解清洁和干燥说明。由于浸入液体而导致的损坏不在保修范围之内。
