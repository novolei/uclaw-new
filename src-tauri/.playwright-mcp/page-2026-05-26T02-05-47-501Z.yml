              - paragraph [ref=e254]: "Verizon iPhone 16, iPhone 16 Plus No Trade-in Required Deal: Monthly price (if shown) reflects net monthly payment, after application of Verizon bill credit applied over 36 months. Customers on an Unlimited Ultimate plan (min. $90/mo w/Auto Pay (+taxes/fees) for 36 mos), Unlimited Plus plan (min. $80/mo w/Auto Pay (+taxes/fees) for 36 mos) or Unlimited Welcome plan (min. $65/mo w/Auto Pay (+taxes/fees) for 36 mos) receive: $730 credit (respectively) with purchase of an iPhone 16; or $830 credit with purchase of an iPhone 16 Plus. Must be a new Verizon customer or adding a new line to an existing Verizon account. If you are trading in a device with this deal, credits will be comprised of (i) Apple instant trade-in credit at checkout and (ii) Verizon monthly bill credits applied over 36 months. Max bill credits will not exceed the cost of the device. Credit comprised of Verizon monthly bill credits applied over 36 months. Customer must remain in the Verizon Device Payment Program for 36 months to receive the full benefit of the Verizon bill credits. Bill credits may take 1-2 bill cycles to appear. If it takes two cycles for bill credits to appear, you’ll see the credit for the first cycle on your second bill in addition to that month’s credit. Requires purchase and activation of a new iPhone 16 or iPhone 16 Plus with the Verizon Device Payment Program at 0% APR for 36 months, subject to carrier credit qualification, and iPhone availability and limits. Taxes and shipping not included in monthly price. Sales tax may be assessed on full value of new iPhone. Requires eligible unlimited service plan. In-store promotion availability subject to local law; speak to a Specialist to learn more. Limited-time offer; subject to change. Additional terms from Apple and Verizon may apply. Price for iPhone 16 and iPhone 16 Plus includes $30 Verizon connectivity discount. Activation required."
        - list [ref=e255]:
          - listitem [ref=e256]: A subscription is required for Apple Arcade, Apple Fitness+, Apple Music, and Apple TV.
          - listitem [ref=e257]: Features are subject to change. Some features, applications, and services may not be available in all regions or all languages.
