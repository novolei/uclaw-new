  - contentinfo "Apple Footer" [ref=e198]:
    - generic [ref=e199]:
      - heading "Apple Footer" [level=2] [ref=e200]
      - region "Footnotes" [ref=e201]:
        - list [ref=e202]:
          - listitem [ref=e203]:
            - paragraph [ref=e204]: "Subject to credit approval. The cost of AirPods Pro 3, for purposes of this offer, does not include applicable taxes, fees, or other charges. Offer may be modified at any time and is not available to applicants who have had this card or who have another pending or approved application for the card. New Apple Card account owners who (1) first open a new Apple Card account and (2) then use it to buy AirPods Pro 3 directly from Apple, May 18, 2026, through June 15, 2026 (“Qualifying Period”), will qualify to earn up to $250 total Bonus Daily Cash after meeting the following spend requirements: beginning July 1, 2026, through April 30, 2027 (“Offer Period”), earn $25 Bonus Daily Cash each month when you use your new Apple Card to make a minimum of ten (10) purchases of any amount ($0.01 or higher) that post to your account each month (“Qualifying Purchases”). AirPods Pro 3 purchases must be made directly from Apple (online or in an Apple Store) using the new Apple Card. Refurbished products, other AirPods models, purchases from third‑party retailers, international purchases, and purchases for business purposes such as company bulk orders are excluded. All AirPods Pro 3 payment options from Apple using Apple Card are eligible for this offer including pay in full or financing via Apple Card Monthly Installments, and regardless of whether a trade-in value was applied to reduce the purchase cost. The qualifying AirPods Pro 3 purchase cannot be made entirely with an Apple Gift Card or Apple Account balance. The AirPods Pro 3 purchase does not count toward the ten (10) Qualifying Purchases required in any month during Offer Period. Returning the qualifying AirPods Pro 3 purchase may result in forfeiture of eligibility for this offer."
            - paragraph [ref=e205]:
              - text: To facilitate this offer and to confirm your AirPods Pro 3 purchase qualifies for this offer, Goldman Sachs will share certain Apple transaction information with Apple, and Apple will provide Goldman Sachs with a confirmation of your qualifying AirPods Pro 3 purchase. Any personal information processed by Apple or Goldman Sachs under this offer will be handled in accordance with the respective
              - link "Apple" [ref=e206] [cursor=pointer]:
                - /url: /legal/privacy/en-ww/
              - text: and
              - link "Goldman Sachs" [ref=e207] [cursor=pointer]:
                - /url: https://www.goldmansachs.com/privacy-and-cookies/Apple_Card_Privacy_Policy.pdf
              - text: privacy policies.
            - paragraph [ref=e208]:
              - text: Offer not available to Apple Card Family members added to, or merged with, an Apple Card account during the Offer Period.
              - generic [ref=e209]:
                - text: Qualifying Purchases can only be made by the new Apple Card account owner who opens a new Apple Card account during the Qualifying Period. New Apple Card account owner does
                - emphasis [ref=e210]: not
                - text: include Co-Owners or Participants added to an Apple Card Family during the Offer Period.
              - text: This means purchases made by Apple Card Family members will not be included toward the new Apple Card account owner’s Qualifying Purchases. Limit one offer per new Apple Card account. This offer can be combined with other Apple Card promotional offers during the Qualifying Period and the Offer Period. If you participate in other Apple Card promotions during the Qualifying Period and the Offer Period, the $25 Bonus Daily Cash earned under this offer will be awarded in addition to applicable Daily Cash earned under additional promotions. $25 Bonus Daily Cash is earned and transferred after the tenth purchase transaction is completed each month during the Offer Period. If a merchant chooses to combine separate charges into a single charge before processing the transaction, the combined transaction will only count as one single purchase transaction for purposes of this offer. For example, if you purchase three items using your Apple Card at the same merchant three separate times within one or more days, that merchant may combine those three transactions and submit them as a single transaction. In that case, that combined transaction will only count as one single purchase transaction in a given month for the applicable Offer Period. Returns and refunds of purchases during the Offer Period may impact your minimum monthly purchase qualification and result in a Daily Cash adjustment charge to your account. An additional purchase made within a given calendar month during the Offer Period may qualify you for re-fulfillment of the Bonus Daily Cash for a given month, but re-fulfillment may be delayed once Qualifying Purchases have posted to your new Apple Card account.
            - paragraph [ref=e211]:
              - text: You can choose to direct Daily Cash to a Savings account or to an Apple Cash account. If you do not have either set up to receive your Daily Cash, it can be applied as statement credit upon request. Apple Card is issued and Savings accounts are provided by Goldman Sachs Bank USA, Salt Lake City Branch, Member FDIC. The Apple Cash card is issued by Green Dot Bank, Member FDIC. Daily Cash is earned on purchases after the transaction posts to your account. Actual posting times vary by merchant. Daily Cash is subject to exclusions, and additional details apply. See the
              - link "Apple Card Customer Agreement" [ref=e212] [cursor=pointer]:
                - /url: https://www.goldmansachs.com/terms-and-conditions/Apple-Card-Customer-Agreement.pdf
              - text: for more information. If we determine that you have engaged in or plan to engage in abuse or gaming in connection with this offer, you will not be eligible for this offer.
            - paragraph [ref=e213]: Apple Payments Services LLC, a subsidiary of Apple Inc., is a service provider of Goldman Sachs Bank USA for Apple Card and Savings accounts. Apple Cash services are provided by Green Dot Bank, Member FDIC. Apple Payments Services LLC, a subsidiary of Apple Inc., is a service provider of Green Dot Bank for Apple Cash accounts. Neither Apple Inc. nor Apple Payments Services LLC is a bank.
          - listitem [ref=e214]: Trade‑in values will vary based on the condition, year, and configuration of your eligible trade‑in device. Not all devices are eligible for credit. You must be at least the age of majority to be eligible to trade in for credit or for an Apple Gift Card. Trade‑in value may be applied toward qualifying new device purchase, or added to an Apple Gift Card. Actual value awarded is based on receipt of a qualifying device matching the description provided when estimate was made. Sales tax may be assessed on full value of a new device purchase. In‑store trade‑in requires presentation of a valid photo ID (local law may require saving this information). Offer may not be available in all stores and may vary between in‑store and online trade‑in. Some stores may have additional requirements. Apple or its trade‑in partners reserve the right to refuse, cancel, or limit quantity of any trade‑in transaction for any reason. More details are available from Apple’s trade-in partner for trade‑in and recycling of eligible devices. Restrictions and limitations may apply.
          - listitem [ref=e215]:
            - generic [ref=e216]:
              - paragraph [ref=e217]: "AT&T iPhone 17 Pro, iPhone 17 Pro Max, and iPhone 17 Special Deal: Monthly price (if shown) reflects net monthly payment, after application of AT&T trade-in credit applied over 36 months with purchase of an iPhone 17 Pro, iPhone 17 Pro Max, and iPhone 17 and trade-in of eligible smartphone. Receive credit with purchase of an iPhone 17 Pro or iPhone 17 Pro Max activated on any eligible AT&T unlimited plan except Unlimited Starter, Unlimited Starter SL, or AT&T Value 2.0 plans of either $1100, $830 or $350 (based upon the model of your trade-in smartphone). Receive credit with purchase of an iPhone 17 Pro or iPhone 17 Pro Max activated on an AT&T Unlimited Starter or AT&T Unlimited Starter SL plan of either $830 or $350 (based upon the model of your trade-in smartphone). Receive credit with purchase of an iPhone 17 Pro or iPhone 17 Pro Max activated on an AT&T Value 2.0 plan of either $500 or $350 (based upon the model of your trade-in smartphone). Receive credit with purchase of an iPhone 17 on any activated on any eligible AT&T unlimited plan except AT&T Value 2.0 plans of either $800 or $350 (based upon the model of your trade-in smartphone). Receive credit with purchase of an iPhone 17 activated on AT&T Value 2.0 plans of either $500 or $350 (based upon the model of your trade-in smartphone). Max bill credits will not exceed the cost of the device. Requires upgrade of an existing line or activation of a new line and purchase of a new iPhone 17 Pro, iPhone 17 Pro Max, or iPhone 17 on qualifying 36 month 0% APR installment plan, subject to carrier credit qualification. Customers purchasing this offer through Apple cannot add the Next Up Anytime option. $0 down for well qualified customers only, or down payment may be required and depends on a variety of factors. Tax on full retail price due at sale. Requires activation on eligible AT&T unlimited plan. AT&T may temporarily slow data speeds if the network is busy. If you cancel eligible wireless service, credits will stop and you will owe the remaining device balance. Activation/Upgrade Fee: $35. Trade in device may not be on existing installment plan. Bill credits are applied as a monthly credit over the 36-month installment plan. Credits start within 3 bills. Will receive catchup credits once credits start. Wireless line must be on an installment agreement, active, and in good standing for 30 days to qualify. Installment agreement starts when device is shipped. To get all credits, device must remain on agreement for entire term and you must keep eligible service on device for entire installment term. Limited time offer; subject to change. Limits: one trade-in per qualifying purchase and one credit per line. May not be combinable with other offers, discounts, or credits. Purchase, financing, other limits, and restrictions apply. Price for iPhone 17 includes $30 AT&T connectivity discount. Activation required."
              - paragraph [ref=e218]: "Boost Mobile iPhone 17 and iPhone Air Special Deal: Buy an iPhone 17 Pro, iPhone 17 Pro Max, iPhone Air, or iPhone 17 and get $830 in bill credits (not to exceed the cost of the iPhone) applied over 36 months. No trade-in required. If you are trading in a device with this deal, trade-in value will be applied as additional bill credits over 36 months. Monthly price (if shown) reflects net monthly payment, after application of $830 in bill credit (not to exceed the cost of the iPhone purchased) and trade-in credit (if applicable) applied over 36 months respectively. Requires activation of a new line, Boost Mobile Infinite Access plan and purchase on qualifying 36-month 0% APR installment plan, subject to carrier credit qualification. After making 12 installment payments, you may upgrade to a new iPhone and get up to $830 in bill credits (not to exceed the cost of the iPhone) applied over 36 months for the new iPhone on the Infinite Access plan and purchase on new qualifying 36-month 0% APR installment plan, subject to carrier credit qualification. Tax on full retail price due at sale. If you cancel eligible wireless service, credits will stop and you will owe the remaining device balance. Bill credits are applied as a monthly credit over the 36-month installment plan. Trade-in credits start within 3 bills. Installment agreement starts when device is shipped. To get all credits, device must remain on agreement for entire term and you must keep eligible service on device for entire installment term. Limited-time offer; subject to change. Limits: one credit per line. May not be combined with other offers, discounts, or credits. Purchase, financing, other limits, and restrictions apply. Price for iPhone 17 includes $30 Boost Mobile connectivity discount. Activation required."
              - paragraph [ref=e219]: "T-Mobile iPhone 17 and iPhone Air Special Deal: Monthly price (if shown) reflects net monthly payment, after application of T-Mobile trade-in credit applied over 24 months with purchase of an iPhone 17 Pro, iPhone 17 Pro Max, iPhone 17, or iPhone Air and trade-in of eligible smartphone. Any Condition trade-in offer requires Experience Beyond or Go5G Next plan. Max bill credits will not exceed the cost of the device. Credit comprised of (i) Apple instant trade-in credit at checkout and (ii) T-Mobile monthly bill credits applied over 24 months. Allow 2 bill cycles from valid submission and validation of trade-in. Tax on pre-credit price due at sale. Limited-time; subject to change. Qualifying credit, data plan, and trade-in (e.g., iPhone 16 Pro Max) in good condition required. May not be combinable with some offers, discounts, or promotions. Activation required. Price for iPhone 17 includes $30 T-Mobile connectivity discount. Contact T-Mobile before cancelling entire account to continue remaining bill credits, or credits stop & balance on required finance agreement is due. Bill credits end if you pay off early."
